<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<!-- Navbar -->
<nav
        class="fixed top-0 left-0 w-full bg-white/90 backdrop-blur-lg border-b border-gray-200 z-50 shadow-sm">

    <div class="max-w-7xl mx-auto px-6">

        <div class="flex items-center justify-between h-20">

            <!-- Logo -->
            <h1 class="text-3xl font-bold cursor-pointer">

                    <span class="text-blue-600">
                        Result
                    </span>

                <span class="text-gray-900">
                        Viewer
                    </span>

            </h1>

            <!-- Desktop Links -->
            <div class="hidden md:flex items-center gap-10">

                <a th:href="@{'/'}"
                   class="text-blue-600 bg-blue-50 px-5 py-2 rounded-xl font-medium">
                    Home
                </a>

                <a th:href="@{'/view-result'}"
                   class="text-gray-700 hover:text-blue-600 transition font-medium">
                    View Result
                </a>

                <a th:href="@{'/admin/add-result'}"
                   class="text-gray-700 hover:text-blue-600 transition font-medium">
                    Add Result
                </a>

                <a
                   class="text-gray-700 hover:text-blue-600 transition font-medium" th:text="${name}">

                </a>

<!--                <a th:href="@{'/help'}"-->
<!--                   class="text-gray-700 hover:text-blue-600 transition font-medium">-->
<!--                    Help-->
<!--                </a>-->

                <form th:action="@{'/user-logout'}" method="post">

                    <button
                            type="submit"
                            class="bg-blue-600 hover:bg-blue-700 transition text-white px-6 py-3 rounded-xl font-medium shadow-lg shadow-blue-200">

                      Logout
                    </button>
                </form>

            </div>

            <!-- Login Button -->
            <button
                    class="hidden md:block bg-blue-600 hover:bg-blue-700 transition text-white px-6 py-3 rounded-xl font-medium shadow-lg shadow-blue-200">

                Login

            </button>

            <!-- Mobile Button -->
            <button id="menu-btn"
                    class="md:hidden text-4xl text-gray-800">

                ☰

            </button>

        </div>

    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu"
         class="hidden md:hidden bg-white border-t border-gray-200 px-6 py-6 space-y-5">

        <a href="#"
           class="block text-blue-600 bg-blue-50 px-4 py-3 rounded-xl font-medium">
            Home
        </a>

        <a href="#"
           class="block text-gray-700 hover:text-blue-600 transition font-medium">
            View Result
        </a>

        <a href="#"
           class="block text-gray-700 hover:text-blue-600 transition font-medium">
            Add Result
        </a>

        <a href="#"
           class="block text-gray-700 hover:text-blue-600 transition font-medium">
            Help
        </a>

        <button
                class="w-full bg-blue-600 hover:bg-blue-700 transition text-white px-6 py-3 rounded-xl font-medium mt-4">

            Login

        </button>

    </div>

</nav>


<div class="lg:w-1/2  w-full py-10 border shadow px-5 mt-3 rounded mx-auto">

    <h1 class="text-3xl text-center text-gray-700 font-bold mt-20">
        Add result form
    </h1>
    <p class=" mt-2  text-gray-500  text-center">Add student result to database</p>

    <form th:action="@{/admin/add-result-action}"
          th:object="${studentForm}"
          method="post"
          enctype="multipart/form-data">

<!--        studentName-->

        <div class="mt-5">

            <label for="studentName"
                   class="block mb-2 text-sm font-medium text-gray-900">

                Student Name

            </label>

            <input
                    th:field="*{name}"
                    type="text"
                    id="studentName"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                    placeholder="Enter student name"
                    required />

            <span class="text-red-700 p-2" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>

        </div>


<!--Roll number-->
        <div class="mt-5">

            <label for="rollNumber"
                   class="block mb-2 text-sm font-medium text-gray-900">

                RollNumber

            </label>

            <input
                    th:field="*{rollNumber}"
                    type="text"
                    id="rollNumber"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                    placeholder="Enter rollNumber"
                    required />

            <span class="text-red-700 p-2" th:if="${#fields.hasErrors('rollNumber')}" th:errors="*{rollNumber}"></span>

        </div>

<!--email-->

        <div class="mt-5">

            <label for="email"
                   class="block mb-2 text-sm font-medium text-gray-900">

                Email

            </label>

            <input
                    th:field="*{email}"
                    type="text"
                    id="email"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                    placeholder="Enter email"
                    required />

            <span class="text-red-700 p-2" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>

        </div>


        <!-- Address -->
        <div class="mt-5">

            <label for="address"
                   class="block mb-2 text-sm font-medium text-gray-900">

                Address

            </label>

            <textarea
                    th:field="*{address}"
                    type="text"
                    id="address"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                    placeholder="Enter address" ></textarea>

            <span class="text-red-700 p-2"
                  th:if="${#fields.hasErrors('address')}"
                  th:errors="*{address}">

    </span>

        </div>

        <!-- School Name -->
        <div class="mt-5">

            <label for="schoolName"
                   class="block mb-2 text-sm font-medium text-gray-900">

                School Name

            </label>

            <input
                    th:field="*{schoolName}"
                    type="text"
                    id="schoolName"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                    placeholder="Enter school name"
                    required />

            <span class="text-red-700 p-2"
                  th:if="${#fields.hasErrors('schoolName')}"
                  th:errors="*{schoolName}">

    </span>

        </div>

        <!-- Date Of Birth -->
        <div class="mt-5">

            <label for="dateOfBirth"
                   class="block mb-2 text-sm font-medium text-gray-900">

                Date Of Birth

            </label>

            <input
                    th:field="*{dateOfBirth}"
                    type="date"
                    id="dateOfBirth"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                    required />

            <span class="text-red-700 p-2"
                  th:if="${#fields.hasErrors('dateOfBirth')}"
                  th:errors="*{dateOfBirth}">

    </span>

        </div>

        <!-- Standard -->
        <!-- Standard -->
        <div class="mt-5">

            <label for="standard"
                   class="block mb-2 text-sm font-medium text-gray-900">

                Standard

            </label>

            <select
                    th:field="*{standard}"
                    id="standard"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5">

                <option value="">
                    Select Standard
                </option>

                <option th:each="std : ${standardOptions}"
                        th:value="${std}"
                        th:text="${std}">

                </option>

            </select>

            <span class="text-red-700 p-2"
                  th:if="${#fields.hasErrors('standard')}"
                  th:errors="*{standard}">

    </span>

        </div>


        <!-- Father Name -->
        <div class="mt-5">

            <label for="fatherName"
                   class="block mb-2 text-sm font-medium text-gray-900">

                Father Name

            </label>

            <input
                    th:field="*{fatherName}"
                    type="text"
                    id="fatherName"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                    placeholder="Enter father name" />

            <span class="text-red-700 p-2"
                  th:if="${#fields.hasErrors('fatherName')}"
                  th:errors="*{fatherName}">

    </span>

        </div>

        <!-- Gender -->
        <!-- Gender -->
        <div class="mt-5">

            <label class="block mb-3 text-sm font-medium text-gray-900">

                Gender

            </label>

            <div class="flex items-center gap-6">

                <!-- Male -->
                <div class="flex items-center gap-2">

                    <input
                            type="radio"
                            name="gender"
                            id="male"
                            value="Male"
                            th:field="*{gender}">

                    <label for="male">
                        Male
                    </label>

                </div>

                <!-- Female -->
                <div class="flex items-center gap-2">

                    <input
                            type="radio"
                            name="gender"
                            id="female"
                            value="Female"
                            th:field="*{gender}">

                    <label for="female">
                        Female
                    </label>

                </div>

                <!-- Other -->
                <div class="flex items-center gap-2">

                    <input
                            type="radio"
                            name="gender"
                            id="other"
                            value="Other"
                            th:field="*{gender}">

                    <label for="other">
                        Other
                    </label>

                </div>

            </div>

            <!-- Error Message -->
            <span class="text-red-700 p-2 block"
                  th:if="${#fields.hasErrors('gender')}"
                  th:errors="*{gender}">

    </span>

        </div>

<!--        subject and marks-->


        <div >

            <div id="marks_container">

            </div>


            <!-- Add Subject Marks Button -->
            <div class="mt-6 flex justify-center">

                <button onclick="addMarksRows()"
                        type="button"
                        class="bg-green-600 hover:bg-green-700 transition text-white px-6 py-3 rounded-xl font-medium shadow-lg shadow-green-200">

                    + Add Subject Marks

                </button>

            </div>

        </div>

        <!-- Buttons -->
        <div class="mt-8 flex justify-center gap-4">

            <!-- Add Result Button -->
            <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 transition text-white px-6 py-3 rounded-xl font-medium shadow-lg shadow-blue-200">

                Add Result

            </button>

            <!-- Clear Button -->
            <button
                    type="reset"
                    class="bg-gray-200 hover:bg-gray-300 transition text-gray-800 px-6 py-3 rounded-xl font-medium">

                Clear

            </button>

        </div>


    </form>

</div>

<script>

    let index = 0;

    function addMarksRows(){

        const container = document.getElementById('marks_container');

        container.insertAdjacentHTML(
            'beforeend',

            `<div class="flex gap-4 rounded border px-3 py-4">

                <div class="flex flex-col">
                    <label>Subject</label>

                    <input
                        name="marks[${index}].subjectName"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                        type="text"
                        placeholder="Enter subject">
                </div>

                <div class="flex flex-col">
                    <label>Marks</label>

                    <input
                        name="marks[${index}].marks"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                        type="text"
                        placeholder="Enter marks">
                </div>

                <div class="flex flex-col">
                    <label>Max Marks</label>

                    <input
                        name="marks[${index}].maxMarks"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                        type="text"
                        placeholder="Enter max marks">
                </div>

                <div class="flex flex-col">
                    <label>Grade</label>

                    <input
                        name="marks[${index}].grade"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                        type="text"
                        placeholder="Enter grade">
                </div>

                <div class="flex flex-col">
                    <label>Feedback</label>

                    <input
                        name="marks[${index}].feedback"
                        class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5"
                        type="text"
                        placeholder="Enter feedback">
                </div>

            </div>`
        );

        index++;
    }

</script>
</body>
</html>
