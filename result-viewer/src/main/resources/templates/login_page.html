<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login Page</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome Icons -->
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
</head>

<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-800 min-h-screen flex items-center justify-center px-4">

<div class="bg-white/10 backdrop-blur-lg border border-white/20 shadow-2xl rounded-3xl p-8 w-full max-w-md text-white">

    <!-- Icon -->
    <div class="flex justify-center mb-5">
        <div class="bg-blue-500 p-4 rounded-full shadow-lg">
            <i class="fa-solid fa-user text-3xl"></i>
        </div>
    </div>

    <!-- Heading -->
    <h1 class="text-4xl font-bold text-center mb-2">
        Welcome Back
    </h1>

    <!-- Subheading -->
    <p class="text-center text-gray-300 mb-8">
        Sign in to your account
    </p>

    <p class="text-center text-green-300 mt-4" th:if="${param.logout }">
        Logout successfully
    </p>

    <p class="text-center text-red-300 mt-4" th:if="${param.error }">
        Invali login detail !!
    </p>
    <!-- Form -->
    <form  th:action="@{/do-login}" method="post" class="space-y-5">

        <!-- Username -->
        <div>
            <label class="block mb-2 text-sm font-medium">
                Username
            </label>

            <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
            <i class="fa-solid fa-user"></i>
          </span>

                <input
                        type="text"
                        name="username"
                        placeholder="Enter your username"
                        class="w-full pl-11 pr-4 py-3 rounded-xl bg-white/20 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-gray-300"
                />
            </div>
        </div>

        <!-- Password -->
        <div>
            <label class="block mb-2 text-sm font-medium">
                Password
            </label>

            <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
            <i class="fa-solid fa-lock"></i>
          </span>

                <input
                        type="password"
                        name="password"
                        placeholder="Enter your password"
                        class="w-full pl-11 pr-4 py-3 rounded-xl bg-white/20 border border-white/20 focus:outline-none focus:ring-2 focus:ring-blue-400 placeholder-gray-300"
                />
            </div>
        </div>

        <!-- Button -->
        <button
                type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 transition duration-300 py-3 rounded-xl font-semibold shadow-lg"
        >
            Login
        </button>

    </form>

    <!-- Footer -->
    <p class="text-center text-gray-300 text-sm mt-6">
        Don't have an account?
        <a href="#" class="text-blue-400 hover:underline">
            Sign Up
        </a>
    </p>

</div>

</body>
</html>
